<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вестник МБДОУ № 266</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #FFFAF0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }

        .header {
            text-align: center;
            padding: 10px 10px;
        }

        h1 {
            font-size: 2.8em;
            margin: 20px 0;
        }

        h2 {
            font-size: 2em;
            text-align: center;
            margin: 10px 0;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .card {
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            overflow: hidden;
            width: calc(33.333% - 20px); /* 3 в ряд */
            transition: transform 0.2s;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .card-content h3 {
            margin-top: 0;
            font-size: 1.2em;
        }

        /* Адаптивность */
        @media (max-width: 1100px) {
             .card { width: calc(50% - 20px); } /* 2 в ряд */
        }

        @media (max-width: 768px) {
             .card { width: calc(100% - 20px); } /* 1 в ряд */
             h1 { font-size: 2em; }
             h2 { font-size: 1.6em; }
         }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h2>МБДОУ № 266 города Ростова-на-Дону</h2>
            <h1>Дошкольный вестник</h1>
        </header>
        <div class="grid">
            <!-- 1 -->
            <div class="card">
                <iframe src="vestnik/2602/2602.html"
                    title="Выпуск 02/26"
                    width="100%"
                    height="500"
                    style="border: none; border-radius: 10px; overflow: hidden;">
                    <p>Ваш браузер не поддерживает фреймы. <a href="vestnik/2602/2602.html">Перейдите по ссылке</a>, чтобы открыть страницу.</p>
                </iframe>
                        <div class="card-content">
                    <h3>Выпуск 02/26</h3>
                </div>
            </div>

            <!-- 2 -->
            <div class="card">
                 <img src="https://via.placeholder.com/400x180.png?text=Картинка+2" alt="Выпуск 01/26">
                <div class="card-content">
                    <h3>Выпуск 01/26</h3>
                </div>
            </div>

             <!-- 3 -->
             <div class="card">
                 <img src="https://via.placeholder.com/400x180.png?text=Картинка+3" alt="Выпуск 12/25">
                 <div class="card-content">
                     <h3>Выпуск 12/25</h3>
                 </div>
             </div>

             <!-- Флекс-контейнер 4 -->
             <div class="card">
                 <img src="https://via.placeholder.com/400x180.png?text=Картинка+4" alt="Выпуск 11/25">
                 <div class="card-content">
                     <h3>Выпуск 11/25</h3>
                 </div>
             </div>

             <!-- 5 -->
             <div class="card">
                 <img src="https://via.placeholder.com/400x180.png?text=Картинка+5" alt="Выпуск 10/25">
                 <div class="card-content">
                     <h3>Выпуск 10/25</h3>
                 </div>
             </div>

             <!-- 6 -->
             <div class="card">
                 <img src="https://via.placeholder.com/400x180.png?text=Картинка+6" alt="Выпуск 09/25">
                 <div class="card-content">
                     <h3>Выпуск 09/25</h3>
                 </div>
             </div>
         </div>
     </div>
</body>
</html>
